<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Film Database</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container py-4">

<h1 class="mb-4">🎬 Film Database</h1>

<!-- CREATE FORM -->
<div class="card p-3 mb-4">
    <input id="tittel" class="form-control mb-2" placeholder="Tittel">
    <input id="spilletid" class="form-control mb-2" placeholder="Spilletid i minutter">
    <input id="produksjonsar" class="form-control mb-2" placeholder="År">
    <input id="regissor" class="form-control mb-2" placeholder="Regissør">
    <select id="sjanger" class="form-control mb-2"></select>

    <button class="btn btn-primary" onclick="addFilm()">Legg til film</button>
</div>

<!-- SEARCH -->
<input 
    id="search" 
    class="form-control mb-3" 
    placeholder="Søk etter film... (!kommando)"
    oninput="liveSearch()"
    onkeyup="handleCommand(event)"
>

<div class="mb-3">
    <button class="btn btn-primary" onclick="toggleFilterMenu()">
        🎛️ Filter
    </button>

    <div id="filterMenu" class="border p-2 mt-2 d-none"></div>
</div>

<button class="btn btn-outline-secondary mb-3" onclick="resetFilter()">
    Vis alle
</button>

<!-- TABLE -->
<table class="table table-striped">
    <thead>
        <tr>
            <th onclick="sortById()" style="cursor:pointer;">
                ID ⬍
            </th>
            <th>Tittel</th>
            <th>Sjanger</th>
            <th onclick="toggleSort()" style="cursor:pointer;">
                År ⬍
            </th>
            <th>Spilletid</th>
            <th>Handling</th>
        </tr>
    </thead>

    <tbody id="filmTable"></tbody>
</table>

<script src="app.js"></script>
</body>
</html>
